<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>kitaphoto preview</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js"></script>
  <link href="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/pmtiles@latest/dist/pmtiles.js"></script>
  <style>
    body { margin: 0; }
    #map { width: 100vw; height: 100vh; }
  </style>
</head>
<body>
<div id="map"></div>
<script>
  // Registers the pmtiles:// protocol so style.json sources can use
  // "url": "pmtiles://<archive-url>" directly (no manual {z}/{x}/{y}
  // template needed — the protocol resolves tiles from the archive).
  let protocol = new pmtiles.Protocol();
  maplibregl.addProtocol("pmtiles", protocol.tile);

  // style.json points kitaphoto-low at a TODO placeholder URL — for a
  // local preview, run `pmtiles serve .` in the directory containing
  // pyramid_v4.pmtiles (renamed/copied to kitaphoto-hokkaido.pmtiles) and
  // edit style.json's "kitaphoto-low" source url to
  // "pmtiles://http://localhost:8080/kitaphoto-hokkaido.pmtiles" first.
  const map = new maplibregl.Map({
    container: "map",
    hash: true,
    style: "./style.json",
    center: [141.3479443, 43.0639091],
    zoom: 10
  });
</script>
</body>
</html>
