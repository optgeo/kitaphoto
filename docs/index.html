<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>kitaphoto preview</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js"></script>
  <link href="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css" rel="stylesheet" />
  <style>
    body { margin: 0; }
    #map { width: 100vw; height: 100vh; }
  </style>
</head>
<body>
<div id="map"></div>
<script>
  // style.json's kitaphoto-low source only resolves once dst/kitaphoto.pmtiles
  // has been uploaded (`just upload`) and martin restarted on stars.local —
  // see HANDOVER.md. Until then this shows real tiles above z13 and nothing
  // below.
  const map = new maplibregl.Map({
    container: "map",
    hash: true,
    style: "./style.json",
    center: [141.3479443, 43.0639091],
    zoom: 10
  });
</script>
</body>
</html>
